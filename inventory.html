<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Overall Project Inventory</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#0f172a;
    color:white;
    padding:20px;
}

.container{
    max-width:1800px;
    margin:auto;
}

h1{
    margin-bottom:20px;
}

.controls{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:20px;
}

textarea{
    width:100%;
    height:180px;
    border:none;
    border-radius:12px;
    padding:15px;
    resize:vertical;
    margin-bottom:15px;
}

button{
    background:#2563eb;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    opacity:.9;
}

input{
    padding:12px;
    border:none;
    border-radius:8px;
    width:300px;
}

.stats{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
    margin-bottom:20px;
}

.stat-card{
    background:#1e293b;
    padding:15px;
    border-radius:12px;
    min-width:180px;
}

.table-wrapper{
    overflow:auto;
    background:#1e293b;
    border-radius:12px;
}

table{
    width:100%;
    border-collapse:collapse;
    white-space:nowrap;
}

th{
    background:#2563eb;
    position:sticky;
    top:0;
    z-index:10;
}

th,td{
    padding:12px;
    border-bottom:1px solid rgba(255,255,255,.1);
    text-align:left;
}

tr:hover{
    background:rgba(255,255,255,.05);
}
</style>
</head>

<body>

<div class="container">

<h1>📦 Overall Project Inventory</h1>

<textarea id="inventoryInput"
placeholder="Paste your inventory data here (including headers)..."></textarea>

<div class="controls">
    <button onclick="importInventory()">Import Inventory</button>
    <button onclick="clearInventory()">Clear</button>

    <input
        type="text"
        id="searchInput"
        placeholder="Search..."
        onkeyup="searchTable()">
</div>

<div class="stats">
    <div class="stat-card">
        <h3>Total Records</h3>
        <h2 id="totalRecords">0</h2>
    </div>
</div>

<div class="table-wrapper">
<table id="inventoryTable">
    <thead></thead>
    <tbody></tbody>
</table>
</div>

</div>

<script>

window.onload = () => {
    const savedData = localStorage.getItem("inventoryData");

    if(savedData){
        renderTable(savedData);
    }
};

function importInventory(){

    const rawData =
        document.getElementById("inventoryInput").value.trim();

    if(!rawData){
        alert("Paste inventory data first.");
        return;
    }

    localStorage.setItem("inventoryData", rawData);

    renderTable(rawData);
}

function renderTable(rawData){

    const rows = rawData
        .split("\n")
        .map(row => row.split("\t"));

    const headers = rows[0];
    const dataRows = rows.slice(1);

    const thead =
        document.querySelector("#inventoryTable thead");

    const tbody =
        document.querySelector("#inventoryTable tbody");

    thead.innerHTML = "";
    tbody.innerHTML = "";

    let headerHTML = "<tr>";

    headers.forEach(header=>{
        headerHTML += `<th>${header}</th>`;
    });

    headerHTML += "</tr>";

    thead.innerHTML = headerHTML;

    dataRows.forEach(row=>{

        let tr = "<tr>";

        row.forEach(cell=>{
            tr += `<td>${cell}</td>`;
        });

        tr += "</tr>";

        tbody.innerHTML += tr;
    });

    document.getElementById("totalRecords").innerText =
        dataRows.length;
}

function searchTable(){

    const filter =
        document.getElementById("searchInput")
        .value
        .toUpperCase();

    const rows =
        document.querySelectorAll("#inventoryTable tbody tr");

    rows.forEach(row=>{

        const text =
            row.textContent.toUpperCase();

        row.style.display =
            text.includes(filter)
            ? ""
            : "none";
    });
}

function clearInventory(){

    if(confirm("Clear inventory?")){

        localStorage.removeItem("inventoryData");

        document.querySelector("#inventoryTable thead").innerHTML="";
        document.querySelector("#inventoryTable tbody").innerHTML="";

        document.getElementById("inventoryInput").value="";
        document.getElementById("totalRecords").innerText="0";
    }
}

</script>

</body>
</html>
