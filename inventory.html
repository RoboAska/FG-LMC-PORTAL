<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Overall Project Inventory</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:linear-gradient(-45deg,#0f172a,#1e3c72,#2563eb,#06b6d4);
background-size:400% 400%;
animation:bg 15s ease infinite;
min-height:100vh;
padding:20px;
color:#fff;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
width:95%;
margin:auto;
}

.header{
text-align:center;
margin-bottom:25px;
}

.header h1{
font-size:32px;
}

.toolbar{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

textarea{
width:100%;
height:180px;
border:none;
border-radius:15px;
padding:15px;
font-size:14px;
margin-bottom:15px;
}

button{
padding:12px 20px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:600;
background:#2563eb;
color:white;
}

button:hover{
opacity:.9;
}

#search{
padding:12px;
border:none;
border-radius:10px;
width:300px;
}

.stats{
display:flex;
gap:15px;
margin-bottom:20px;
flex-wrap:wrap;
}

.stat{
background:rgba(255,255,255,.12);
backdrop-filter:blur(10px);
padding:15px;
border-radius:15px;
min-width:180px;
}

.table-container{
overflow:auto;
background:rgba(255,255,255,.08);
backdrop-filter:blur(10px);
border-radius:15px;
}

table{
width:100%;
border-collapse:collapse;
white-space:nowrap;
}

th{
background:#2563eb;
position:sticky;
top:0;
z-index:10;
}

th,td{
padding:12px;
border-bottom:1px solid rgba(255,255,255,.15);
}

tr:hover{
background:rgba(255,255,255,.08);
}

.back-btn{
display:inline-block;
margin-bottom:20px;
text-decoration:none;
background:#334155;
padding:12px 20px;
border-radius:10px;
color:white;
}

</style>
</head>
<body>

<div class="container">

<a href="index.html" class="back-btn">← Back to Dashboard</a>

<div class="header">
<h1>📦 Overall Project Inventory</h1>
<p>Paste Inventory Data from Excel</p>
</div>

<textarea id="inventoryInput" placeholder="Paste your inventory here..."></textarea>

<div class="toolbar">
<button onclick="importInventory()">Import Data</button>
<button onclick="clearInventory()">Clear</button>

<input
type="text"
id="search"
placeholder="Search..."
onkeyup="searchInventory()">
</div>

<div class="stats">
<div class="stat">
<h3>Total Records</h3>
<h1 id="recordCount">0</h1>
</div>
</div>

<div class="table-container">
<table id="inventoryTable">
<thead></thead>
<tbody></tbody>
</table>
</div>

</div>

<script>

window.onload=()=>{

const saved=localStorage.getItem("inventoryData");

if(saved){
renderTable(saved);
}

};

function importInventory(){

const raw=document.getElementById("inventoryInput").value.trim();

if(!raw){
alert("Paste inventory first.");
return;
}

localStorage.setItem("inventoryData",raw);

renderTable(raw);

}

function renderTable(raw){

const rows=raw.split("\n").map(r=>r.split("\t"));

const headers=rows[0];
const data=rows.slice(1);

const thead=document.querySelector("#inventoryTable thead");
const tbody=document.querySelector("#inventoryTable tbody");

thead.innerHTML="";
tbody.innerHTML="";

let headerRow="<tr>";

headers.forEach(h=>{
headerRow+=`<th>${h}</th>`;
});

headerRow+="</tr>";

thead.innerHTML=headerRow;

data.forEach(row=>{

let tr="<tr>";

row.forEach(cell=>{
tr+=`<td>${cell}</td>`;
});

tr+="</tr>";

tbody.innerHTML+=tr;

});

document.getElementById("recordCount").innerText=data.length;

}

function searchInventory(){

const filter=document.getElementById("search").value.toUpperCase();

const rows=document.querySelectorAll("#inventoryTable tbody tr");

rows.forEach(row=>{

const txt=row.textContent.toUpperCase();

row.style.display=txt.includes(filter) ? "" : "none";

});

}

function clearInventory(){

if(confirm("Clear inventory?")){

localStorage.removeItem("inventoryData");

document.querySelector("#inventoryTable thead").innerHTML="";
document.querySelector("#inventoryTable tbody").innerHTML="";

document.getElementById("recordCount").innerText="0";

document.getElementById("inventoryInput").value="";

}

}

</script>

</body>
</html>
